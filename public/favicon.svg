<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Stained glass diamond panel -->
  <rect x="4" y="4" width="24" height="24" rx="3" fill="#7c3aed" stroke="#4c1d95" stroke-width="1.5"/>
  <!-- Lead came lines -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#4c1d95" stroke-width="1.2"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#4c1d95" stroke-width="1.2"/>
  <line x1="4" y1="4" x2="28" y2="28" stroke="#4c1d95" stroke-width="1"/>
  <line x1="28" y1="4" x2="4" y2="28" stroke="#4c1d95" stroke-width="1"/>
  <!-- Glass panes with varied colors -->
  <path d="M5 5 L16 5 L16 16 L5 16 Z" fill="#a78bfa" opacity="0.5"/>
  <path d="M16 16 L28 16 L28 28 L16 28 Z" fill="#a78bfa" opacity="0.5"/>
  <path d="M16 5 L28 5 L16 16 Z" fill="#c4b5fd" opacity="0.4"/>
  <path d="M5 16 L16 16 L5 28 Z" fill="#c4b5fd" opacity="0.4"/>
  <!-- Highlight -->
  <rect x="6" y="6" width="4" height="4" rx="1" fill="white" opacity="0.3"/>
</svg>
